query Posts(
  $projectId: UUID!
  $after: Cursor
  $pageSize: Int = 10
  $orderBy: [PostOrderBy!] = CREATED_AT_DESC
  $excludedStatuses: [String!]
  $search: String
  $userId: UUID
  # nullable relation filter: null = no tag filter, else { some: { tagId: { in } } }
  $tagFilter: PostToManyPostTagFilter
) {
  posts(
    after: $after
    first: $pageSize
    orderBy: $orderBy
    filter: {
      projectId: { equalTo: $projectId }
      title: { includesInsensitive: $search }
      # include posts whose status is not excluded, plus posts with no status
      # (status-less posts can't be filtered by a status pill, so always show)
      or: [
        { statusTemplate: { name: { notIn: $excludedStatuses } } }
        { statusTemplateId: { isNull: true } }
      ]
      postTags: $tagFilter
    }
  ) {
    pageInfo {
      startCursor
      endCursor
      hasNextPage
      hasPreviousPage
    }
    totalCount
    nodes {
      ...Feedback
    }
  }
}
